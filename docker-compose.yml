services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./.env
        required: false
      - path: ./backend/.env
        required: false
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
      - CORS_ORIGINS=http://localhost:5173
      - GEMINI_RETRY_ATTEMPTS=${GEMINI_RETRY_ATTEMPTS:-3}
      - GEMINI_RETRY_BASE_DELAY_MS=${GEMINI_RETRY_BASE_DELAY_MS:-800}
      - ASSESSMENT_SKILL_LIMIT=${ASSESSMENT_SKILL_LIMIT:-1}
      - QUESTIONS_PER_SKILL=${QUESTIONS_PER_SKILL:-2}
      - SESSION_DB_PATH=${SESSION_DB_PATH:-data/sessions.db}

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
