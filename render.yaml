services:
  - type: web
    name: skillprobe-backend
    env: python
    region: frankfurt
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: CORS_ORIGINS
        value: "*" # Update this to your exact Vercel frontend URL for production security
      - key: GEMINI_API_KEY
        sync: false # Do not commit this! Add manually in the Render dashboard
